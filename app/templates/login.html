{% extends 'base.html' %}
{% block html %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Entrar</h1>
        <p>Acesse sua conta para continuar.</p>

        <form action="/login" method="POST">
            <div class="form-group" style="margin-bottom:16px">
                <label>Email</label>
                <input type="text" name="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group" style="margin-bottom:24px">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-adicionar" style="width:100%; justify-content:center;">
                Entrar
            </button>
        </form>

        <p style="margin-top:20px; text-align:center; font-size:14px;">
            Não tem conta? <a href="/cadastro" style="color:var(--verde); font-weight:500;">Cadastre-se</a>
        </p>
    </div>
</div>

{% endblock %}
